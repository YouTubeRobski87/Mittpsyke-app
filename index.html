<!DOCTYPE html>
<html lang="sv" data-theme="emerald">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MittPsyke" />
  <meta name="version" content="2.1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>MittPsyke Wellness Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .mood-btn { transition: all 0.2s; }
    .mood-btn:hover, .mood-btn.active { transform: scale(1.15); }
  </style>
</head>
<body class="bg-green-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const { Home, BookOpen, TrendingUp, PlusCircle, Trash2, ArrowLeft, ExternalLink, Heart, Brain, Shield, Sparkles, Map } = lucideReact;

    // --- Storage helpers (localStorage) ---
    function loadData(key, fallback) {
      try { return JSON.parse(localStorage.getItem('mittpsyke_' + key)) || fallback; }
      catch { return fallback; }
    }
    function saveData(key, data) {
      localStorage.setItem('mittpsyke_' + key, JSON.stringify(data));
    }

    // --- Navigation ---
    function Navigation({ active, onNavigate }) {
      const items = [
        { id: 'home', label: 'Hem', icon: Home },
        { id: 'mood', label: 'Mående', icon: PlusCircle },
        { id: 'journal', label: 'Dagbok', icon: BookOpen },
        { id: 'guides', label: 'Guider', icon: Map },
        { id: 'progress', label: 'Framsteg', icon: TrendingUp },
      ];
      return (
        <div className="bg-white border-t border-green-100 flex justify-around py-2 shrink-0">
          {items.map(({ id, label, icon: Icon }) => (
            <button key={id} onClick={() => onNavigate(id)}
              className={`flex flex-col items-center gap-1 px-3 py-1 rounded-lg transition-colors ${active === id ? 'text-green-600 font-semibold' : 'text-gray-400 hover:text-green-500'}`}>
              <Icon size={20} />
              <span className="text-xs">{label}</span>
            </button>
          ))}
        </div>
      );
    }

    // --- Mood Check-In ---
    function MoodCheckIn({ onSave }) {
      const [mood, setMood] = useState(null);
      const [focus, setFocus] = useState('Allmänt');
      const [note, setNote] = useState('');
      const moods = [
        { val: 1, emoji: '😢', label: 'Mycket dåligt' },
        { val: 2, emoji: '😕', label: 'Dåligt' },
        { val: 3, emoji: '😐', label: 'Okej' },
        { val: 4, emoji: '🙂', label: 'Bra' },
        { val: 5, emoji: '😊', label: 'Mycket bra' },
      ];
      const areas = ['Ångest', 'Depression', 'Trauma', 'Allmänt'];
      const handleSave = () => {
        if (!mood) return;
        onSave({ mood, focus, note, date: new Date().toISOString() });
        setMood(null); setNote(''); setFocus('Allmänt');
      };
      return (
        <div className="p-4 space-y-6">
          <div className="text-center">
            <h2 className="text-xl font-bold text-green-800">Hur mår du?</h2>
            <p className="text-sm text-green-600 mt-1">Välj det som bäst beskriver ditt mående just nu</p>
          </div>
          <div className="flex justify-center gap-4">
            {moods.map(m => (
              <button key={m.val} onClick={() => setMood(m.val)}
                className={`mood-btn flex flex-col items-center gap-1 p-2 rounded-xl ${mood === m.val ? 'active bg-green-100 ring-2 ring-green-400' : ''}`}>
                <span className="text-3xl">{m.emoji}</span>
                <span className="text-xs text-gray-500">{m.label}</span>
              </button>
            ))}
          </div>
          <div>
            <label className="text-sm font-medium text-green-700 mb-2 block">Fokusområde</label>
            <div className="flex flex-wrap gap-2">
              {areas.map(a => (
                <button key={a} onClick={() => setFocus(a)}
                  className={`btn btn-sm ${focus === a ? 'btn-success' : 'btn-outline btn-success'}`}>{a}</button>
              ))}
            </div>
          </div>
          <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Berätta mer om hur du känner..."
            className="textarea textarea-bordered w-full h-24 bg-white focus:border-green-400" />
          <button onClick={handleSave} disabled={!mood}
            className="btn btn-success w-full text-white">Spara incheckning</button>
        </div>
      );
    }

    // --- Journal ---
    function JournalView({ entries, onAdd, onDelete }) {
      const [writing, setWriting] = useState(false);
      const [title, setTitle] = useState('');
      const [body, setBody] = useState('');
      const [focus, setFocus] = useState('Allmänt');
      const areas = ['Ångest', 'Depression', 'Trauma', 'Allmänt'];
      const handleSave = () => {
        if (!title.trim() && !body.trim()) return;
        onAdd({ title: title || 'Utan titel', body, focus, date: new Date().toISOString() });
        setTitle(''); setBody(''); setFocus('Allmänt'); setWriting(false);
      };
      if (writing) return (
        <div className="p-4 space-y-4">
          <button onClick={() => setWriting(false)} className="btn btn-ghost btn-sm gap-1"><ArrowLeft size={16}/> Tillbaka</button>
          <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Titel..."
            className="input input-bordered w-full bg-white focus:border-green-400" />
          <div className="flex flex-wrap gap-2">
            {areas.map(a => (
              <button key={a} onClick={() => setFocus(a)}
                className={`btn btn-xs ${focus === a ? 'btn-success' : 'btn-outline btn-success'}`}>{a}</button>
            ))}
          </div>
          <textarea value={body} onChange={e => setBody(e.target.value)} placeholder="Skriv dina tankar..."
            className="textarea textarea-bordered w-full h-40 bg-white focus:border-green-400" />
          <button onClick={handleSave} className="btn btn-success w-full text-white">Spara</button>
        </div>
      );
      return (
        <div className="p-4 space-y-4">
          <div className="flex justify-between items-center">
            <h2 className="text-xl font-bold text-green-800">📖 Dagbok</h2>
            <button onClick={() => setWriting(true)} className="btn btn-success btn-sm text-white gap-1"><PlusCircle size={16}/> Ny</button>
          </div>
          {entries.length === 0 ? (
            <div className="text-center py-12 text-gray-400">
              <BookOpen size={48} className="mx-auto mb-3 opacity-50" />
              <p>Inga anteckningar ännu</p>
              <p className="text-sm">Tryck på "Ny" för att börja skriva</p>
            </div>
          ) : (
            <div className="space-y-3">
              {entries.slice().reverse().map((e, i) => (
                <div key={i} className="card bg-white shadow-sm">
                  <div className="card-body p-4">
                    <div className="flex justify-between items-start">
                      <div>
                        <h3 className="font-semibold text-green-800">{e.title}</h3>
                        <span className="badge badge-success badge-outline badge-sm mt-1">{e.focus}</span>
                      </div>
                      <button onClick={() => onDelete(entries.length - 1 - i)} className="btn btn-ghost btn-xs text-red-400"><Trash2 size={14}/></button>
                    </div>
                    <p className="text-sm text-gray-600 mt-2 whitespace-pre-wrap">{e.body}</p>
                    <p className="text-xs text-gray-400 mt-2">{new Date(e.date).toLocaleDateString('sv-SE')}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // --- Progress ---
    function ProgressView({ moods, journals }) {
      const recent = moods.slice(-14);
      const avg = recent.length ? (recent.reduce((s, m) => s + m.mood, 0) / recent.length).toFixed(1) : '—';

      // Streak calculation
      const getStreak = () => {
        if (!moods.length) return 0;
        const dates = [...new Set(moods.map(m => m.date.slice(0,10)))].sort().reverse();
        let streak = 0;
        let current = new Date();
        current.setHours(0,0,0,0);
        for (let d of dates) {
          const day = new Date(d);
          const diff = Math.round((current - day) / 86400000);
          if (diff === 0 || diff === streak) { streak++; current = day; }
          else break;
        }
        return streak;
      };
      const streak = getStreak();

      // Milestones
      const total = moods.length + journals.length;
      const milestones = [
        { count: 1, label: 'Första steget', emoji: '🌱' },
        { count: 5, label: '5 inlägg', emoji: '⭐' },
        { count: 10, label: '10 inlägg', emoji: '🎯' },
        { count: 25, label: '25 inlägg', emoji: '🏆' },
        { count: 50, label: '50 inlägg', emoji: '💪' },
        { count: 100, label: '100 inlägg', emoji: '🚀' },
      ];

      // Activity heatmap (last 28 days)
      const heatmap = () => {
        const days = [];
        const today = new Date();
        today.setHours(0,0,0,0);
        const moodDates = new Set(moods.map(m => m.date.slice(0,10)));
        const journalDates = new Set(journals.map(j => j.date.slice(0,10)));
        for (let i = 27; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          const key = d.toISOString().slice(0,10);
          const hasMood = moodDates.has(key);
          const hasJournal = journalDates.has(key);
          days.push({ key, hasMood, hasJournal, active: hasMood || hasJournal });
        }
        return days;
      };
      const heatDays = heatmap();

      const focusCounts = {};
      moods.forEach(m => { if(m.focus) focusCounts[m.focus] = (focusCounts[m.focus] || 0) + 1; });
      const maxCount = Math.max(...Object.values(focusCounts), 1);

      return (
        <div className="p-4 space-y-5">
          <h2 className="text-xl font-bold text-green-800">📊 Framsteg</h2>

          {/* Stats row */}
          <div className="grid grid-cols-3 gap-3">
            <div className="card bg-white shadow-sm text-center p-3">
              <div className="text-2xl font-bold text-orange-500">🔥 {streak}</div>
              <div className="text-xs text-gray-500 mt-1">dagars streak</div>
            </div>
            <div className="card bg-white shadow-sm text-center p-3">
              <div className="text-2xl font-bold text-green-600">{avg}</div>
              <div className="text-xs text-gray-500 mt-1">snitt mående</div>
            </div>
            <div className="card bg-white shadow-sm text-center p-3">
              <div className="text-2xl font-bold text-blue-500">{total}</div>
              <div className="text-xs text-gray-500 mt-1">totala inlägg</div>
            </div>
          </div>

          {/* Activity heatmap */}
          <div className="card bg-white shadow-sm">
            <div className="card-body p-4">
              <h3 className="font-semibold text-green-700 mb-3">Aktivitet – 28 dagar</h3>
              <div className="grid grid-cols-7 gap-1">
                {heatDays.map((d, i) => (
                  <div
                    key={d.key}
                    title={d.key}
                    className={"rounded w-full aspect-square " + (
                      d.hasMood && d.hasJournal ? "bg-green-600" :
                      d.active ? "bg-green-300" :
                      "bg-gray-100"
                    )}
                  />
                ))}
              </div>
              <div className="flex gap-3 mt-2 text-xs text-gray-400">
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-gray-100 inline-block"/> Ingen</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-300 inline-block"/> Aktiv</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-600 inline-block"/> Båda</span>
              </div>
            </div>
          </div>

          {/* Milestones */}
          <div className="card bg-white shadow-sm">
            <div className="card-body p-4">
              <h3 className="font-semibold text-green-700 mb-3">Milstolpar</h3>
              <div className="space-y-2">
                {milestones.map(m => {
                  const done = total >= m.count;
                  return (
                    <div key={m.count} className={"flex items-center gap-3 p-2 rounded-lg " + (done ? "bg-green-50" : "opacity-40")}>
                      <span className="text-xl">{done ? m.emoji : '🔒'}</span>
                      <span className={"text-sm flex-1 " + (done ? "text-green-800 font-medium" : "text-gray-400")}>{m.label}</span>
                      {done && <span className="text-xs text-green-500">✓ Uppnådd</span>}
                      {!done && <span className="text-xs text-gray-400">{m.count - total} kvar</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Mood trend */}
          {recent.length > 0 && (
            <div className="card bg-white shadow-sm">
              <div className="card-body p-4">
                <h3 className="font-semibold text-green-700 mb-3">Mående-trend (14 dagar)</h3>
                <div className="flex items-end gap-1 h-24">
                  {recent.map((m, i) => (
                    <div key={i} className="flex-1 flex flex-col items-center justify-end gap-1">
                      <div className="bg-green-400 rounded-t w-full transition-all" style={{ height: `${(m.mood / 5) * 100}%` }} />
                      <span className="text-[9px] text-gray-400">{new Date(m.date).getDate()}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Focus areas */}
          {Object.keys(focusCounts).length > 0 && (
            <div className="card bg-white shadow-sm">
              <div className="card-body p-4">
                <h3 className="font-semibold text-green-700 mb-3">Fokusområden</h3>
                <div className="space-y-2">
                  {Object.entries(focusCounts).map(([area, count]) => (
                    <div key={area} className="flex items-center gap-3">
                      <span className="text-sm w-24 text-gray-600">{area}</span>
                      <progress className="progress progress-success flex-1" value={count} max={maxCount} />
                      <span className="text-sm text-gray-500 w-6 text-right">{count}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* AI Insights */}
          {moods.length >= 3 && (() => {
            const days = ['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'];
            const dayData = {};
            moods.forEach(m => {
              const d = new Date(m.date).getDay();
              if (!dayData[d]) dayData[d] = [];
              dayData[d].push(m.mood);
            });
            const dayAvgs = Object.entries(dayData).map(([d, vals]) => ({
              day: days[parseInt(d)],
              avg: (vals.reduce((a,b)=>a+b,0)/vals.length),
              count: vals.length
            })).filter(d => d.count >= 1);
            dayAvgs.sort((a,b) => b.avg - a.avg);
            const bestDay = dayAvgs[0];
            const worstDay = dayAvgs[dayAvgs.length - 1];

            // Trend: compare last 7 vs previous 7
            const last7 = moods.slice(-7).reduce((s,m)=>s+m.mood,0) / Math.max(moods.slice(-7).length,1);
            const prev7 = moods.slice(-14,-7).reduce((s,m)=>s+m.mood,0) / Math.max(moods.slice(-14,-7).length,1);
            const trend = moods.length >= 5 ? (last7 - prev7) : 0;

            // Patterns
            const patterns = [];
            if (trend > 0.3) patterns.push({ icon: '📈', title: 'Positiv trend', desc: 'Ditt mående har förbättrats den senaste veckan.' });
            else if (trend < -0.3) patterns.push({ icon: '💙', title: 'Tuffare period', desc: 'Den senaste veckan har varit lite tyngre. Det är okej — du är här.' });
            else patterns.push({ icon: '⚖️', title: 'Stabilt mående', desc: 'Du håller ett jämnt mående — det är en styrka i sig.' });

            const topFocus = Object.entries(focusCounts).sort((a,b)=>b[1]-a[1])[0];
            if (topFocus) patterns.push({ icon: '🎯', title: 'Vanligaste fokus', desc: `Du jobbar mest med "${topFocus[0]}" — bra medvetenhet!` });

            if (streak >= 7) patterns.push({ icon: '🔥', title: 'Streak-mästare', desc: `${streak} dagar i rad! Det bygger verkliga vanor.` });
            if (moods.length >= 10) patterns.push({ icon: '🌱', title: 'Konsekvent', desc: `${moods.length} incheckningar totalt — du tar din hälsa på allvar.` });

            // Summary text
            let summary = '';
            if (trend > 0.3) summary = `Bra jobbat! Din trend pekar uppåt och du har ${streak > 0 ? streak + ' dagars streak.' : 'checkat in regelbundet.'}`;
            else if (trend < -0.3) summary = `Den här perioden verkar lite tyngre, men faktum är att du fortfarande är här och följer upp — det räknas.`;
            else summary = `Du håller ett stabilt mående. ${moods.length >= 10 ? 'Med ' + moods.length + ' inlägg bakom dig börjar mönster visa sig.' : 'Fortsätt checka in så ser du mönster växa fram.'}`;

            return (
              <div className="card bg-gradient-to-br from-purple-50 to-indigo-50 shadow-sm border border-purple-200">
                <div className="card-body p-4">
                  <div className="flex items-center gap-2 mb-3">
                    <span className="text-2xl">🧠</span>
                    <h3 className="font-semibold text-purple-800 text-lg">AI-insikter</h3>
                  </div>
                  
                  <div className="bg-white rounded-xl p-3 mb-3 border border-purple-100">
                    <p className="text-sm text-gray-700 leading-relaxed">{summary}</p>
                  </div>

                  {bestDay && worstDay && bestDay.day !== worstDay.day && (
                    <div className="grid grid-cols-2 gap-2 mb-3">
                      <div className="bg-green-50 rounded-xl p-3 border border-green-200">
                        <p className="text-xs text-gray-500 uppercase tracking-wide">Mår bäst på</p>
                        <p className="font-bold text-green-700 text-base">{bestDay.day}</p>
                        <p className="text-xs text-gray-400">Snitt {bestDay.avg.toFixed(1)}/5</p>
                      </div>
                      <div className="bg-orange-50 rounded-xl p-3 border border-orange-200">
                        <p className="text-xs text-gray-500 uppercase tracking-wide">Svårare på</p>
                        <p className="font-bold text-orange-600 text-base">{worstDay.day}</p>
                        <p className="text-xs text-gray-400">Snitt {worstDay.avg.toFixed(1)}/5</p>
                      </div>
                    </div>
                  )}

                  <div className="space-y-2">
                    {patterns.map((p, i) => (
                      <div key={i} className="flex items-start gap-2 bg-white rounded-lg p-2 border border-purple-100">
                        <span className="text-base mt-0.5">{p.icon}</span>
                        <div>
                          <p className="text-sm font-semibold text-gray-800">{p.title}</p>
                          <p className="text-xs text-gray-500">{p.desc}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })()}

          {moods.length === 0 && journals.length === 0 && (
            <div className="text-center py-8 text-gray-400">
              <TrendingUp size={48} className="mx-auto mb-3 opacity-50" />
              <p>Ingen data ännu</p>
              <p className="text-sm">Gör din första incheckning för att se framsteg</p>
            </div>
          )}
        </div>
      );
    }


    // --- Guides ---
    function GuidesView() {
      const [open, setOpen] = React.useState(null);
      const toggle = (id) => { setOpen(prev => prev === id ? null : id); };
      const guides = [
        {
          id: 'anxiety',
          emoji: '💭',
          color: 'blue',
          title: 'Ångest',
          subtitle: 'Förstå och hantera ångesten',
          steps: [
            { icon: '🔍', title: 'Vad är ångest?', body: 'Ångest är kroppens larmsystem — ett naturligt svar på upplevd fara. Det är obehagligt men inte farligt. Hjärnan tolkar en situation som hotfull och triggar stressreaktioner som hjärtklappning, andnöd och oro.' },
            { icon: '🌬️', title: '4-7-8 andning', body: 'Andas in i 4 sekunder → håll i 7 sekunder → andas ut i 8 sekunder. Upprepa 3–4 gånger. Tekniken aktiverar det parasympatiska nervsystemet och lugnar kroppen snabbt.' },
            { icon: '🌿', title: '5-4-3-2-1 grounding', body: 'Nämn 5 saker du ser, 4 du hör, 3 du kan röra vid, 2 du kan lukta, 1 du kan smaka. Metoden tar dig ur tankarna och tillbaka till nuet.' },
            { icon: '📓', title: 'Skriv ner oron', body: 'Ta fram ett papper och skriv ner vad som oroar dig. Fråga dig: Är detta ett faktum eller en tanke? Kan jag göra något åt det nu? Ofta krymper oron bara av att sätta ord på den.' },
            { icon: '🚶', title: 'Rörelse hjälper', body: 'Även en 10-minuters promenad sänker stresshormoner märkbart. Du behöver inte springa maraton — kroppen svarar snabbt på mild rörelse.' },
          ]
        },
        {
          id: 'depression',
          emoji: '🌧️',
          color: 'indigo',
          title: 'Depression',
          subtitle: 'Steg ut ur det mörka',
          steps: [
            { icon: '💡', title: 'Vad är depression?', body: 'Depression är mer än att vara ledsen. Det är en varaktig sänkning av energi, motivation och glädje. Hjärnans kemi förändras och allt känns tungt. Det är en riktig sjukdom — inte en svaghet.' },
            { icon: '🌅', title: 'Börja litet', body: 'Gör en sak varje dag. Inte tio. En. Borsta tänderna, ta en dusch, gå ut en minut. Aktivering skapar energi, inte tvärtom. Varje litet steg bryter mönstret.' },
            { icon: '☀️', title: 'Ljus och rytm', body: 'Gå ut på morgonen — naturligt ljus reglerar serotonin och din dygnsrytm. Försök lägga dig och stiga upp ungefär samma tid varje dag, även helger.' },
            { icon: '🤝', title: 'Bryt isoleringen', body: 'Depression vill att du ska vara ensam — motarbeta det. Skicka ett meddelande till en person du litar på. Du behöver inte förklara allt. "Hej, tänkte på dig" räcker.' },
            { icon: '🧠', title: 'Utmana negativa tankar', body: 'Depression ljuger. "Allt är hopplöst" och "Ingen bryr sig" är symptom, inte fakta. Skriv ner tanken och fråga: Vad är beviset? Hur skulle en vän se på det här?' },
          ]
        },
        {
          id: 'trauma',
          emoji: '🌊',
          color: 'teal',
          title: 'Trauma',
          subtitle: 'Läka från svåra upplevelser',
          steps: [
            { icon: '💙', title: 'Vad är trauma?', body: 'Trauma uppstår när en händelse överväldigar din förmåga att hantera den. Det lagras i kroppen och nervsystemet, inte bara i minnet. Reaktioner som flashbacks, rädsla och undvikande är normala svar på onormala upplevelser.' },
            { icon: '🌱', title: 'Trygghet först', body: 'Läkning börjar med att skapa trygghet — fysiskt och emotionellt. Identifiera platser, personer och rutiner som får dig att känna dig trygg. Det är grunden för allt annat.' },
            { icon: '🔗', title: 'Kropp och koppling', body: 'Trauma sitter i kroppen. Mjuka rörelser som yoga, promenader eller dans hjälper nervsystemet att reglera sig. Du behöver inte prata om det för att börja läka.' },
            { icon: '📝', title: 'Skriv om det', body: 'Forskning visar att skriva om traumatiska upplevelser i 15–20 minuter under flera dagar kan minska symtom. Det handlar inte om att förklara — bara att uttrycka.' },
            { icon: '🤗', title: 'Du förtjänar stöd', body: 'Trauma läker bäst i relation. En trygg terapeut, stödgrupp eller nära vän gör skillnad. Att söka hjälp är styrka, inte svaghet.' },
          ]
        },
        {
          id: 'stress',
          emoji: '⚡',
          color: 'orange',
          title: 'Stress',
          subtitle: 'Vinn tillbaka lugnet',
          steps: [
            { icon: '🔋', title: 'Vad händer vid stress?', body: 'Stress är kroppens beredskapsläge — adrenalin och kortisol pumpar in. Kortvarig stress är bra. Kronisk stress sliter på hjärta, immunförsvar och hjärna. Kroppen behöver återhämtning.' },
            { icon: '📋', title: 'Prioritera brutalt', body: 'Skriv ner allt du ska göra. Cirka sedan bara det som faktiskt måste göras idag. Resten väntar. Hjärnan lugnar sig när listan krymper.' },
            { icon: '⏸️', title: 'Mikro-pauser', body: 'Ta en 2-minuters paus var 45:e minut. Res på dig, titta bort från skärmen, andas djupt. Dessa mikropauser återställer fokus bättre än att kämpa igenom utan pauser.' },
            { icon: '🚫', title: 'Säg nej', body: '"Nej" är en komplett mening. Du behöver inte motivera det. Varje ja till något nytt är ett nej till din återhämtning. Börja öva på att säga nej till en sak per vecka.' },
            { icon: '🌙', title: 'Sömn är medicin', body: 'Sömnbrist förstärker stressreaktioner dramatiskt. 7–9 timmar är inte lyx. Skärmfri 30 min innan sänggåendet, sval temperatur i rummet, och fast sömnrytm — tre enkla regler.' },
          ]
        },
        {
          id: 'sleep',
          emoji: '🌙',
          color: 'violet',
          title: 'Sömnproblem',
          subtitle: 'Hitta vägen till god sömn',
          steps: [
            { icon: '🧬', title: 'Varför sover vi dåligt?', body: 'Stress, skärmar, oregelbundna tider och koffein är vanligaste bovarna. Sömnbrist skapar en ond cirkel: du är trött men kan inte sova. Hjärnan hamnar i ett överaktivt läge.' },
            { icon: '⏰', title: 'Fast rytm', body: 'Stig upp samma tid varje dag — även helger. Det är det enskilt viktigaste för god sömn. Din inre klocka behöver konsekvens för att fungera optimalt.' },
            { icon: '📵', title: 'Skärmfri buffert', body: 'Stäng av skärmar 30–60 minuter innan du lägger dig. Blått ljus hämmar melatoninproduktionen. Byt till en bok, lugn musik eller stretching.' },
            { icon: '🛏️', title: 'Sängen = sömn', body: 'Använd sängen bara för sömn. Inte för att scrolla, titta film eller jobba. Hjärnan lär sig koppla sängen med vakenhet — bryt det mönstret.' },
            { icon: '🫁', title: 'Body scan', body: 'Ligg ner och fokusera på en kroppsdel i taget, från tårna upp till hjässan. Känn tyngden, slappna av varje del medvetet. Tekniken sänker hjärtfrekvens och varvar ner tankarna.' },
          ]
        },
        {
          id: 'selfesteem',
          emoji: '💪',
          color: 'green',
          title: 'Självkänsla',
          subtitle: 'Bygg ett starkare jag',
          steps: [
            { icon: '🌟', title: 'Vad är självkänsla?', body: 'Självkänsla är din grundläggande känsla av att vara värd kärlek och respekt — oavsett prestationer. Den formas tidigt men kan förändras hela livet. Du är inte fast i den du är idag.' },
            { icon: '✍️', title: 'Tre saker varje kväll', body: 'Skriv tre saker du gjort bra under dagen — hur litet som helst. "Jag steg upp" räknas. Hjärnan har en negativitetsbias; du måste aktivt mata den med positiva bevis om dig själv.' },
            { icon: '🔄', title: 'Utmana din inre kritiker', body: 'Lyssna på hur du pratar med dig själv. Skulle du säga det till en vän? Ofta inte. Prova att bemöta den inre kritikern med "Tack för oron, men jag klarar det." Inte suppression — svar.' },
            { icon: '🎯', title: 'Gör det du säger', body: 'Självkänsla byggs av att hålla löften till sig själv. Börja med ett litet åtagande och håll det. Varje gång du gör det skickar du ett budskap till din hjärna: "Jag litar på mig själv."' },
            { icon: '🚫', title: 'Sätt gränser', body: 'Tydliga gränser kommunicerar att du värdesätter dig själv. Det handlar inte om att vara svår — det handlar om att veta vad du behöver och kommunicera det med respekt.' },
          ]
        },
      ];

      const colorMap = {
        blue: { bg: 'bg-blue-50', border: 'border-blue-200', title: 'text-blue-800', tag: 'badge-info', stepBg: 'bg-blue-50', stepBorder: 'border-blue-100' },
        indigo: { bg: 'bg-indigo-50', border: 'border-indigo-200', title: 'text-indigo-800', tag: 'badge-info', stepBg: 'bg-indigo-50', stepBorder: 'border-indigo-100' },
        teal: { bg: 'bg-teal-50', border: 'border-teal-200', title: 'text-teal-800', tag: 'badge-success', stepBg: 'bg-teal-50', stepBorder: 'border-teal-100' },
        orange: { bg: 'bg-orange-50', border: 'border-orange-200', title: 'text-orange-800', tag: 'badge-warning', stepBg: 'bg-orange-50', stepBorder: 'border-orange-100' },
        violet: { bg: 'bg-violet-50', border: 'border-violet-200', title: 'text-violet-800', tag: 'badge-info', stepBg: 'bg-violet-50', stepBorder: 'border-violet-100' },
        green: { bg: 'bg-green-50', border: 'border-green-200', title: 'text-green-800', tag: 'badge-success', stepBg: 'bg-green-50', stepBorder: 'border-green-100' },
      };

      return (
        <div className="p-4 space-y-4 pb-6">
          <div>
            <h2 className="text-xl font-bold text-green-800">📚 Guider</h2>
            <p className="text-sm text-gray-500 mt-1">Klicka på en guide för att läsa</p>
          </div>
          {guides.map(g => {
            const isOpen = open === g.id;
            const c = colorMap[g.color];
            return (
              <div key={g.id} className={"card shadow-sm border transition-all duration-200 " + c.border + " " + (isOpen ? c.bg : "bg-white")}>
                <button
                  className="card-body p-4 text-left w-full"
                  onClick={() => toggle(g.id)}
                >
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <span className="text-3xl">{g.emoji}</span>
                      <div>
                        <h3 className={"font-bold text-base " + c.title}>{g.title}</h3>
                        <p className="text-xs text-gray-500">{g.subtitle}</p>
                      </div>
                    </div>
                    <span className={"text-gray-400 text-lg transition-transform duration-200 " + (isOpen ? "rotate-180" : "")}>▾</span>
                  </div>
                </button>
                {isOpen && (
                  <div className="px-4 pb-4 space-y-3">
                    {g.steps.map((s, i) => (
                      <div key={i} className={"rounded-xl p-3 border " + c.stepBg + " " + c.stepBorder}>
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-xl">{s.icon}</span>
                          <span className={"font-semibold text-sm " + c.title}>{s.title}</span>
                        </div>
                        <p className="text-sm text-gray-600 leading-relaxed">{s.body}</p>
                      </div>
                    ))}
                    <div className="pt-1">
                      <a href={"https://www.mittpsyke.se/" + g.id} target="_blank" rel="noopener"
                        className="btn btn-sm btn-outline btn-success w-full gap-1">
                        Läs mer på mittpsyke.se →
                      </a>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // --- Home ---
    function HomeView({ moods, journals, onNavigate }) {
      const lastMood = moods.length ? moods[moods.length - 1] : null;
      const lastJournal = journals.length ? journals[journals.length - 1] : null;
      const moodEmojis = { 1: '😢', 2: '😕', 3: '😐', 4: '🙂', 5: '😊' };
      return (
        <div className="p-4 space-y-5">
          <div className="text-center py-4">
            <div className="flex justify-center gap-2 mb-2">
              <Heart size={24} className="text-green-500" />
              <Brain size={24} className="text-green-500" />
              <Shield size={24} className="text-green-500" />
            </div>
            <h1 className="text-2xl font-bold text-green-800">MittPsyke</h1>
            <p className="text-green-600 text-sm mt-1">Din trygga plats för reflektion</p>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => onNavigate('mood')} className="btn btn-success text-white gap-2 h-auto py-4 flex-col">
              <PlusCircle size={24}/><span>Ny incheckning</span>
            </button>
            <button onClick={() => onNavigate('journal')} className="btn btn-outline btn-success gap-2 h-auto py-4 flex-col">
              <BookOpen size={24}/><span>Skriv dagbok</span>
            </button>
          </div>
          {lastMood && (
            <div className="card bg-white shadow-sm">
              <div className="card-body p-4">
                <h3 className="font-semibold text-green-700">Senaste mående</h3>
                <div className="flex items-center gap-3 mt-2">
                  <span className="text-3xl">{moodEmojis[lastMood.mood]}</span>
                  <div>
                    <span className="badge badge-success badge-outline badge-sm">{lastMood.focus}</span>
                    <p className="text-xs text-gray-400 mt-1">{new Date(lastMood.date).toLocaleDateString('sv-SE')}</p>
                  </div>
                </div>
                {lastMood.note && <p className="text-sm text-gray-600 mt-2">{lastMood.note}</p>}
              </div>
            </div>
          )}
          {lastJournal && (
            <div className="card bg-white shadow-sm">
              <div className="card-body p-4">
                <h3 className="font-semibold text-green-700">Senaste dagbok</h3>
                <p className="font-medium text-gray-700 mt-1">{lastJournal.title}</p>
                <p className="text-sm text-gray-500 line-clamp-2">{lastJournal.body}</p>
                <p className="text-xs text-gray-400 mt-1">{new Date(lastJournal.date).toLocaleDateString('sv-SE')}</p>
              </div>
            </div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <a href="https://www.mittpsyke.se" target="_blank" rel="noopener"
              className="btn btn-outline btn-sm gap-1"><Sparkles size={14}/> mittpsyke.se</a>
            <a href="https://www.stodlinjer.se" target="_blank" rel="noopener"
              className="btn btn-outline btn-sm gap-1"><ExternalLink size={14}/> stödlinjer.se</a>
          </div>
        </div>
      );
    }

    // --- Main App ---
    function App() {
      const [view, setView] = useState('home');
      const [moods, setMoods] = useState(() => loadData('moods', []));
      const [journals, setJournals] = useState(() => loadData('journals', []));

      useEffect(() => saveData('moods', moods), [moods]);
      useEffect(() => saveData('journals', journals), [journals]);

      const handleMoodSave = (entry) => { setMoods(prev => [...prev, entry]); setView('home'); };
      const handleJournalAdd = (entry) => { setJournals(prev => [...prev, entry]); };
      const handleJournalDelete = (idx) => { setJournals(prev => prev.filter((_, i) => i !== idx)); };

      return (
        <div className="min-h-screen flex flex-col bg-green-50 max-w-md mx-auto">
          <div className="bg-green-600 text-white text-center py-3 font-bold text-lg shrink-0 shadow">
            🌿 MittPsyke
          </div>
          <div className="flex-1 overflow-y-auto">
            {view === 'home' && <HomeView moods={moods} journals={journals} onNavigate={setView} />}
            {view === 'mood' && <MoodCheckIn onSave={handleMoodSave} />}
            {view === 'journal' && <JournalView entries={journals} onAdd={handleJournalAdd} onDelete={handleJournalDelete} />}
            {view === 'guides' && <GuidesView />}
            {view === 'progress' && <ProgressView moods={moods} journals={journals} />}
          </div>
          <Navigation active={view} onNavigate={setView} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
